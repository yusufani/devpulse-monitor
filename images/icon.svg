<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#16161E"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EC9B0" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#4EC9B0" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4EC9B0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4EC9B0" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="124" height="124" rx="20" ry="20" fill="url(#bg)" stroke="#2A2A3E" stroke-width="1.5"/>

  <!-- Subtle grid pattern (chip/circuit feel) -->
  <g opacity="0.06" stroke="#4EC9B0" stroke-width="0.5" fill="none">
    <line x1="32" y1="12" x2="32" y2="116"/>
    <line x1="64" y1="12" x2="64" y2="116"/>
    <line x1="96" y1="12" x2="96" y2="116"/>
    <line x1="12" y1="32" x2="116" y2="32"/>
    <line x1="12" y1="64" x2="116" y2="64"/>
    <line x1="12" y1="96" x2="116" y2="96"/>
  </g>

  <!-- Soft background glow behind pulse -->
  <polyline
    points="6,66 22,66 30,66 38,64 42,68 46,58 50,72 54,50 58,42 60,64 62,28 64,18 66,64 68,42 70,50 74,72 78,58 82,68 86,64 94,66 106,66 122,66"
    fill="none"
    stroke="#4EC9B0"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softglow)"
    opacity="0.3"
  />

  <!-- Main pulse/heartbeat line with GPU-chip-like sharp peaks -->
  <polyline
    points="6,66 22,66 30,66 38,64 42,68 46,58 50,72 54,50 58,42 60,64 62,28 64,18 66,64 68,42 70,50 74,72 78,58 82,68 86,64 94,66 106,66 122,66"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Small accent dots at key signal points -->
  <circle cx="64" cy="18" r="2.5" fill="#4EC9B0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="62" cy="28" r="1.5" fill="#4EC9B0" opacity="0.6"/>
  <circle cx="68" cy="42" r="1.5" fill="#4EC9B0" opacity="0.6"/>

  <!-- Minimal chip pins on sides (circuit board aesthetic) -->
  <g stroke="#4EC9B0" stroke-width="1.5" opacity="0.15" stroke-linecap="round">
    <!-- Left pins -->
    <line x1="2" y1="44" x2="10" y2="44"/>
    <line x1="2" y1="54" x2="10" y2="54"/>
    <line x1="2" y1="74" x2="10" y2="74"/>
    <line x1="2" y1="84" x2="10" y2="84"/>
    <!-- Right pins -->
    <line x1="118" y1="44" x2="126" y2="44"/>
    <line x1="118" y1="54" x2="126" y2="54"/>
    <line x1="118" y1="74" x2="126" y2="74"/>
    <line x1="118" y1="84" x2="126" y2="84"/>
    <!-- Top pins -->
    <line x1="44" y1="2" x2="44" y2="10"/>
    <line x1="54" y1="2" x2="54" y2="10"/>
    <line x1="74" y1="2" x2="74" y2="10"/>
    <line x1="84" y1="2" x2="84" y2="10"/>
    <!-- Bottom pins -->
    <line x1="44" y1="118" x2="44" y2="126"/>
    <line x1="54" y1="118" x2="54" y2="126"/>
    <line x1="74" y1="118" x2="74" y2="126"/>
    <line x1="84" y1="118" x2="84" y2="126"/>
  </g>

  <!-- Corner circuit traces -->
  <g stroke="#4EC9B0" stroke-width="1" opacity="0.1" fill="none" stroke-linecap="round">
    <polyline points="18,22 22,22 22,18"/>
    <polyline points="110,22 106,22 106,18"/>
    <polyline points="18,106 22,106 22,110"/>
    <polyline points="110,106 106,106 106,110"/>
  </g>
</svg>
